name: Docker Build & Push

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t cloud-cost-optimizer:${{ github.ref_name }} .
      - run: docker tag cloud-cost-optimizer:${{ github.ref_name }} cloud-cost-optimizer:latest
